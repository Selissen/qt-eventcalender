name: app
description: "Flutter shell for the eventcalendar app — embedded inside the Qt host via Win32 HWND."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.0
  go_router: ^13.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  core:
    path: ../packages/core
  design_system:
    path: ../packages/design_system
  feature_plans:
    path: ../packages/feature_plans
  feature_week_view:
    path: ../packages/feature_week_view

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
