syntax = "proto3";
package calendar;

option optimize_for = SPEED;

// ── Reference data ───────────────────────────────────────────────────────────

message Unit  { int32 id = 1; string name = 2; }
message Route { int32 id = 1; string name = 2; }

message GetUnitsResponse  { repeated Unit  units  = 1; }
message GetRoutesResponse { repeated Route routes = 1; }

// ── Plan CRUD ────────────────────────────────────────────────────────────────

// Dates are ISO strings ("yyyy-MM-dd"); times are seconds since midnight.
message PlanData {
    string name            = 1;
    string start_date      = 2;
    int32  start_time_secs = 3;
    string end_date        = 4;
    int32  end_time_secs   = 5;
    int32  unit_id         = 6;
    repeated int32 route_ids = 7;
}

message AddPlanRequest    { PlanData data = 1; }
message AddPlanResponse   { int32 id = 1; bool success = 2; }

message UpdatePlanRequest  { int32 id = 1; PlanData data = 2; }
message UpdatePlanResponse { bool success = 1; }

message DeletePlanRequest  { int32 id = 1; }
message DeletePlanResponse { bool success = 1; }

message Empty {}

// ── Server-streaming subscriptions ───────────────────────────────────────────

// Filter by unit IDs; leave empty to receive events for all units.
message SubscribePlansRequest {
    repeated int32 unit_ids = 1;
}

enum PlanEventType {
    PLAN_ADDED   = 0;
    PLAN_UPDATED = 1;
    PLAN_DELETED = 2;
}

// Pushed by the server whenever a plan is mutated.
// data is populated for PLAN_ADDED and PLAN_UPDATED; empty for PLAN_DELETED.
message PlanEvent {
    PlanEventType type = 1;
    int32         id   = 2;
    PlanData      data = 3;
}

// ── Service ──────────────────────────────────────────────────────────────────

service CalendarService {
    rpc GetUnits   (Empty)             returns (GetUnitsResponse);
    rpc GetRoutes  (Empty)             returns (GetRoutesResponse);
    rpc AddPlan    (AddPlanRequest)    returns (AddPlanResponse);
    rpc UpdatePlan (UpdatePlanRequest) returns (UpdatePlanResponse);
    rpc DeletePlan (DeletePlanRequest) returns (DeletePlanResponse);

    // Server-streaming subscription — works via gRPC (desktop) and
    // gRPC-Web / Envoy (WASM browser). Stays open until cancelled.
    rpc SubscribePlans (SubscribePlansRequest) returns (stream PlanEvent);
}
